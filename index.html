<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Placar — Pedro vs William</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --brand: #2563EB;
      --brand-hover: #1D4ED8;
      --brand-active: #1E40AF;
      --success: #16A34A;
      --error: #DC2626;
      --warning: #F59E0B;
      --info: #3B82F6;

      --text-primary: #111827;
      --text-secondary: #4B5563;
      --text-muted: #9CA3AF;
      --text-inverse: #FFFFFF;

      --surface: #FFFFFF;
      --canvas: #F9FAFB;
      --muted-surface: #F3F4F6;

      --border-default: #E5E7EB;
      --border-muted: #F3F4F6;
      --border-strong: #D1D5DB;
      --border-focus: #2563EB;

      --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
      --shadow-md: 0 8px 24px rgba(0,0,0,0.08);
      --shadow-lg: 0 20px 40px rgba(0,0,0,0.12);

      --radius-xs: 4px;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 20px;

      --font: 'Inter', system-ui, sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--canvas);
      color: var(--text-primary);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 24px 16px;
    }

    @media (min-width: 768px) {
      .container {
        padding: 48px 24px;
      }
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .header h1 {
      font-size: 30px;
      line-height: 38px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .header p {
      font-size: 16px;
      line-height: 24px;
      color: var(--text-secondary);
    }

    /* Cards */
    .card {
      background: var(--surface);
      border-radius: var(--radius-lg);
      padding: 24px;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border-default);
      margin-bottom: 24px;
    }

    /* Login */
    .login-card {
      max-width: 400px;
      margin: 80px auto 0;
      text-align: center;
    }

    .login-card h2 {
      font-size: 24px;
      line-height: 32px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .login-card p {
      font-size: 14px;
      line-height: 20px;
      color: var(--text-secondary);
      margin-bottom: 24px;
    }

    .input-group {
      display: flex;
      gap: 8px;
    }

    input[type="text"],
    input[type="number"] {
      font-family: var(--font);
      height: 48px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border-strong);
      padding: 0 16px;
      font-size: 16px;
      line-height: 24px;
      color: var(--text-primary);
      background: var(--surface);
      outline: none;
      transition: border-color 200ms ease-out, box-shadow 200ms ease-out;
      width: 100%;
    }

    input::placeholder {
      color: var(--text-muted);
    }

    input:focus {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    /* Buttons */
    .btn {
      font-family: var(--font);
      height: 48px;
      border-radius: var(--radius-md);
      border: none;
      padding: 0 24px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: all 200ms ease-out;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      white-space: nowrap;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-primary {
      background: var(--brand);
      color: var(--text-inverse);
    }

    .btn-primary:hover:not(:disabled) {
      background: var(--brand-hover);
    }

    .btn-primary:active:not(:disabled) {
      background: var(--brand-active);
    }

    .btn-secondary {
      background: transparent;
      border: 1px solid var(--brand);
      color: var(--brand);
    }

    .btn-secondary:hover:not(:disabled) {
      background: rgba(37, 99, 235, 0.04);
    }

    .btn-ghost {
      background: transparent;
      color: var(--text-secondary);
    }

    .btn-ghost:hover:not(:disabled) {
      background: var(--muted-surface);
    }

    .btn-sm {
      height: 40px;
      padding: 0 16px;
      font-size: 14px;
    }

    /* Scoreboard */
    .scoreboard {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 16px;
      align-items: center;
      margin-bottom: 24px;
    }

    .player-card {
      text-align: center;
      padding: 32px 16px;
    }

    .player-card.active {
      border-color: var(--brand);
      background: rgba(37, 99, 235, 0.02);
    }

    .player-name {
      font-size: 20px;
      line-height: 28px;
      font-weight: 600;
      margin-bottom: 16px;
    }

    .player-score {
      font-size: 48px;
      line-height: 56px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .player-score.locked {
      color: var(--text-secondary);
    }

    .vs {
      font-size: 20px;
      font-weight: 600;
      color: var(--text-muted);
    }

    /* Vote section */
    .vote-section {
      text-align: center;
    }

    .vote-section h3 {
      font-size: 16px;
      line-height: 24px;
      font-weight: 500;
      margin-bottom: 16px;
      color: var(--text-secondary);
    }

    .vote-input-group {
      display: flex;
      gap: 8px;
      max-width: 280px;
      margin: 0 auto;
    }

    .vote-input-group input {
      flex: 1;
    }

    /* Timer */
    .timer {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      border-radius: var(--radius-sm);
      background: var(--muted-surface);
      font-size: 14px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-top: 16px;
    }

    .timer.warning {
      background: #FEF3C7;
      color: #92400E;
    }

    .timer.expired {
      background: #FEE2E2;
      color: #991B1B;
    }

    .timer-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
    }

    .timer.warning .timer-dot {
      background: var(--warning);
    }

    .timer.expired .timer-dot {
      background: var(--error);
    }

    /* Status badge */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: var(--radius-xs);
      font-size: 12px;
      line-height: 16px;
      font-weight: 500;
      margin-top: 12px;
    }

    .badge-success {
      background: #DCFCE7;
      color: #166534;
    }

    .badge-warning {
      background: #FEF3C7;
      color: #92400E;
    }

    .badge-info {
      background: #DBEAFE;
      color: #1E40AF;
    }

    /* History */
    .history-card h3 {
      font-size: 16px;
      line-height: 24px;
      font-weight: 600;
      margin-bottom: 16px;
      color: var(--text-primary);
    }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .history-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      background: var(--canvas);
    }

    .history-date {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-secondary);
    }

    .history-scores {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 14px;
      font-weight: 600;
    }

    .history-scores .pedro {
      color: var(--brand);
    }

    .history-scores .william {
      color: #7C3AED;
    }

    .history-scores .dash {
      color: var(--text-muted);
      font-weight: 400;
    }

    .history-winner {
      font-size: 12px;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: var(--radius-xs);
    }

    .winner-pedro {
      background: #DBEAFE;
      color: #1E40AF;
    }

    .winner-william {
      background: #EDE9FE;
      color: #5B21B6;
    }

    .winner-tie {
      background: var(--muted-surface);
      color: var(--text-secondary);
    }

    /* Total score */
    .total-section {
      display: flex;
      justify-content: center;
      gap: 48px;
      padding: 24px;
      margin-bottom: 24px;
    }

    .total-item {
      text-align: center;
    }

    .total-label {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }

    .total-value {
      font-size: 36px;
      line-height: 44px;
      font-weight: 700;
    }

    .total-pedro {
      color: var(--brand);
    }

    .total-william {
      color: #7C3AED;
    }

    /* User info bar */
    .user-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      margin-bottom: 24px;
      border-bottom: 1px solid var(--border-muted);
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .user-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 600;
      color: var(--text-inverse);
    }

    .avatar-pedro {
      background: var(--brand);
    }

    .avatar-william {
      background: #7C3AED;
    }

    .user-name {
      font-size: 16px;
      font-weight: 600;
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 32px 16px;
      color: var(--text-muted);
      font-size: 14px;
    }

    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .fade-in {
      animation: fadeIn 300ms ease-out;
    }

    /* Responsive */
    @media (max-width: 480px) {
      .header h1 {
        font-size: 24px;
        line-height: 32px;
      }

      .player-score {
        font-size: 36px;
        line-height: 44px;
      }

      .scoreboard {
        gap: 8px;
      }

      .player-card {
        padding: 24px 8px;
      }

      .total-section {
        gap: 32px;
      }

      .total-value {
        font-size: 30px;
        line-height: 38px;
      }

      .history-item {
        flex-direction: column;
        gap: 8px;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>Placar</h1>
      <p>Pedro vs William</p>
    </header>

    <div id="app"></div>
  </div>

  <script>
    const PLAYERS = ['Pedro', 'William'];
    const EDIT_WINDOW_MS = 5 * 60 * 1000; // 5 minutes
    const STORAGE_KEY = 'placar_votes';
    const HISTORY_KEY = 'placar_history';

    function getToday() {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    }

    function formatDate(dateStr) {
      const [y, m, d] = dateStr.split('-');
      return `${d}/${m}/${y}`;
    }

    function loadVotes() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
      } catch { return {}; }
    }

    function saveVotes(votes) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(votes));
    }

    function loadHistory() {
      try {
        return JSON.parse(localStorage.getItem(HISTORY_KEY)) || [];
      } catch { return []; }
    }

    function saveHistory(history) {
      localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
    }

    function getDayVotes(today) {
      const votes = loadVotes();
      return votes[today] || null;
    }

    function canEdit(player, today) {
      const dayVotes = getDayVotes(today);
      if (!dayVotes) return false;
      const vote = dayVotes[player];
      if (!vote || !vote.timestamp) return false;
      return Date.now() - vote.timestamp < EDIT_WINDOW_MS;
    }

    function hasVoted(player, today) {
      const dayVotes = getDayVotes(today);
      return dayVotes && dayVotes[player] != null;
    }

    function submitVote(player, score, today) {
      const votes = loadVotes();
      if (!votes[today]) votes[today] = {};
      votes[today][player] = {
        score: Number(score),
        timestamp: Date.now()
      };
      saveVotes(votes);

      // Save to history when both have voted
      if (votes[today].Pedro != null && votes[today].William != null) {
        const history = loadHistory();
        const existingIdx = history.findIndex(h => h.date === today);
        const entry = {
          date: today,
          pedro: Number(votes[today].Pedro.score),
          william: Number(votes[today].William.score)
        };
        if (existingIdx >= 0) {
          history[existingIdx] = entry;
        } else {
          history.unshift(entry);
        }
        saveHistory(history);
      }
    }

    function getTotalScore(player) {
      const history = loadHistory();
      return history.reduce((sum, h) => {
        return sum + (player === 'Pedro' ? h.pedro : h.william);
      }, 0);
    }

    // Render functions
    function renderLogin() {
      const app = document.getElementById('app');
      app.innerHTML = `
        <div class="card login-card fade-in">
          <h2>Quem é você?</h2>
          <p>Selecione seu nome para acessar o placar</p>
          <div class="input-group">
            <input type="text" id="nameInput" placeholder="Pedro ou William" autocomplete="off">
            <button class="btn btn-primary" onclick="handleLogin()">Entrar</button>
          </div>
        </div>
      `;
      document.getElementById('nameInput').focus();
      document.getElementById('nameInput').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') handleLogin();
      });
    }

    function handleLogin() {
      const input = document.getElementById('nameInput');
      const name = input.value.trim();
      if (!PLAYERS.includes(name)) {
        input.style.borderColor = 'var(--error)';
        input.style.boxShadow = '0 0 0 3px rgba(220,38,38,0.1)';
        setTimeout(() => {
          input.style.borderColor = '';
          input.style.boxShadow = '';
        }, 1500);
        return;
      }
      currentUser = name;
      renderBoard();
    }

    let currentUser = null;
    let timerInterval = null;

    function renderBoard() {
      const today = getToday();
      const dayVotes = getDayVotes(today);
      const pedroScore = dayVotes && dayVotes.Pedro ? dayVotes.Pedro.score : null;
      const williamScore = dayVotes && dayVotes.William ? dayVotes.William.score : null;
      const userHasVoted = hasVoted(currentUser, today);
      const userCanEdit = canEdit(currentUser, today);
      const otherPlayer = PLAYERS.find(p => p !== currentUser);
      const otherHasVoted = hasVoted(otherPlayer, today);

      const app = document.getElementById('app');

      let voteSectionHTML = '';
      if (userHasVoted && userCanEdit) {
        const remaining = EDIT_WINDOW_MS - (Date.now() - (dayVotes && dayVotes[currentUser] ? dayVotes[currentUser].timestamp : 0));
        const minutes = Math.floor(remaining / 60000);
        const seconds = Math.floor((remaining % 60000) / 1000);
        const timeStr = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
        const timerClass = remaining < 10000 ? 'warning' : '';
        voteSectionHTML = `
          <div class="vote-section fade-in">
            <h3>Edite sua pontuação</h3>
            <div class="vote-input-group">
              <input type="number" id="scoreInput" placeholder="Pontos" min="0" max="999" value="${currentUser === 'Pedro' ? pedroScore : williamScore}">
              <button class="btn btn-primary" onclick="handleVote()">Salvar</button>
            </div>
            <div class="timer ${timerClass}" id="timer">
              <span class="timer-dot"></span>
              <span id="timerText">${timeStr} restantes para editar</span>
            </div>
          </div>
        `;
      } else if (userHasVoted && !userCanEdit) {
        voteSectionHTML = `
          <div class="vote-section fade-in">
            <div class="badge badge-success">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg>
              Seu voto foi registrado
            </div>
            <p style="font-size:14px;color:var(--text-muted);margin-top:12px;">Volte amanhã para votar novamente</p>
          </div>
        `;
      } else {
        voteSectionHTML = `
          <div class="vote-section fade-in">
            <h3>Qual sua pontuação hoje?</h3>
            <div class="vote-input-group">
              <input type="number" id="scoreInput" placeholder="Pontos" min="0" max="999">
              <button class="btn btn-primary" onclick="handleVote()">Votar</button>
            </div>
          </div>
        `;
      }

      app.innerHTML = `
        <div class="fade-in">
          <div class="user-bar">
            <div class="user-info">
              <div class="user-avatar avatar-${currentUser.toLowerCase()}">${currentUser[0]}</div>
              <span class="user-name">${currentUser}</span>
            </div>
            <button class="btn btn-ghost btn-sm" onclick="handleLogout()">Sair</button>
          </div>

          <div class="card">
            <div class="scoreboard">
              <div class="player-card card ${currentUser === 'Pedro' ? 'active' : ''}">
                <div class="player-name">Pedro</div>
                <div class="player-score ${pedroScore === null ? 'locked' : ''}">${pedroScore !== null ? pedroScore : '—'}</div>
                ${pedroScore !== null && hasVoted('Pedro', today) && !canEdit('Pedro', today) ? '<div class="badge badge-success"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg> Votou</div>' : ''}
              </div>
              <div class="vs">vs</div>
              <div class="player-card card ${currentUser === 'William' ? 'active' : ''}">
                <div class="player-name">William</div>
                <div class="player-score ${williamScore === null ? 'locked' : ''}">${williamScore !== null ? williamScore : '—'}</div>
                ${williamScore !== null && hasVoted('William', today) && !canEdit('William', today) ? '<div class="badge badge-success"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg> Votou</div>' : ''}
              </div>
            </div>

            ${voteSectionHTML}
          </div>

          <div class="total-section">
            <div class="total-item">
              <div class="total-label">Total Pedro</div>
              <div class="total-value total-pedro">${getTotalScore('Pedro')}</div>
            </div>
            <div class="total-item">
              <div class="total-label">Total William</div>
              <div class="total-value total-william">${getTotalScore('William')}</div>
            </div>
          </div>

          <div class="card history-card">
            <h3>Histórico</h3>
            ${renderHistory()}
          </div>
        </div>
      `;

      // Focus input if not voted yet
      if (!userHasVoted) {
        const input = document.getElementById('scoreInput');
        if (input) input.focus();
        const scoreInput = document.getElementById('scoreInput');
        if (scoreInput) {
          scoreInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') handleVote();
          });
        }
      }

      // Start timer if editing
      if (userHasVoted && userCanEdit) {
        startTimer();
      }
    }

    function renderHistory() {
      const history = loadHistory();
      if (history.length === 0) {
        return '<div class="empty-state">Nenhuma rodada completa ainda.<br>Ambos precisam votar para registrar no histórico.</div>';
      }

      return `
        <div class="history-list">
          ${history.slice(0, 10).map(h => {
            let winnerClass = 'winner-tie';
            let winnerText = 'Empate';
            if (h.pedro > h.william) {
              winnerClass = 'winner-pedro';
              winnerText = 'Pedro';
            } else if (h.william > h.pedro) {
              winnerClass = 'winner-william';
              winnerText = 'William';
            }
            return `
              <div class="history-item">
                <span class="history-date">${formatDate(h.date)}</span>
                <div class="history-scores">
                  <span class="pedro">${h.pedro}</span>
                  <span class="dash">—</span>
                  <span class="william">${h.william}</span>
                </div>
                <span class="history-winner ${winnerClass}">${winnerText}</span>
              </div>
            `;
          }).join('')}
        </div>
      `;
    }

    function handleVote() {
      const input = document.getElementById('scoreInput');
      const score = input.value.trim();
      if (score === '' || isNaN(Number(score))) {
        input.style.borderColor = 'var(--error)';
        input.style.boxShadow = '0 0 0 3px rgba(220,38,38,0.1)';
        setTimeout(() => {
          input.style.borderColor = '';
          input.style.boxShadow = '';
        }, 1500);
        return;
      }
      const today = getToday();
      submitVote(currentUser, score, today);
      if (timerInterval) clearInterval(timerInterval);
      renderBoard();
    }

    function handleLogout() {
      if (timerInterval) clearInterval(timerInterval);
      currentUser = null;
      renderLogin();
    }

    function startTimer() {
      if (timerInterval) clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        if (!canEdit(currentUser, getToday())) {
          clearInterval(timerInterval);
          renderBoard();
          return;
        }
        const dayVotes = getDayVotes(getToday());
        const remaining = EDIT_WINDOW_MS - (Date.now() - (dayVotes && dayVotes[currentUser] ? dayVotes[currentUser].timestamp : 0));
        if (remaining <= 0) {
          clearInterval(timerInterval);
          renderBoard();
          return;
        }
        const minutes = Math.floor(remaining / 60000);
        const seconds = Math.floor((remaining % 60000) / 1000);
        const timeStr = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
        const timerEl = document.getElementById('timer');
        const timerTextEl = document.getElementById('timerText');
        if (timerTextEl) timerTextEl.textContent = `${timeStr} restantes para editar`;
        if (timerEl) {
          if (remaining < 10000) {
            timerEl.className = 'timer warning';
          } else {
            timerEl.className = 'timer';
          }
        }
      }, 1000);
    }

    // Init
    renderLogin();
  </script>
</body>
</html>
