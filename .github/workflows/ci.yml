name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  quality:
    name: Lint and build
    runs-on: ubuntu-latest

    env:
      # Build only needs public placeholders; real values come from hosting envs.
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: public-anon-key-for-ci
      NEXT_PUBLIC_BASE_URL: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  migrate:
    name: Run Supabase migrations
    runs-on: ubuntu-latest
    # Deploy schema only when merging/pushing to main or running manually.
    # PRs skip remote push so feature branches cannot alter production.
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Supabase credentials
        id: creds
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_PROJECT_ID" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Supabase secrets are not configured; skipping migrations."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Supabase CLI
        if: steps.creds.outputs.configured == 'true'
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        if: steps.creds.outputs.configured == 'true'
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: Push database migrations
        if: steps.creds.outputs.configured == 'true'
        run: supabase db push
